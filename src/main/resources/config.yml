# ==============================================================
# Hooked 插件配置文件
# 木筏求生 - 漂浮物收集系统
# ==============================================================
#
# 修改后请使用 /hooked reload 重载配置（无需重启服务器）
# 所有数值选项均有安全默认值，缺失条目会自动使用默认值

# --------------------------------------------------------------
# 调试模式
# --------------------------------------------------------------
# 开启后控制台会输出详细的生成/漂流/钩取日志
# 玩家可使用 /hooked debug 切换个人调试模式
debug: true

# --------------------------------------------------------------
# 漂浮物 (Debris) 相关设置
# --------------------------------------------------------------
debris:
  # 每个玩家周围最多同时存在的漂浮物数量
  max_per_player: 10

  # 生成检测间隔（秒），每隔此时间检测一次是否需要补充漂浮物
  spawn_interval_seconds: 10

  # 漂浮物距玩家的最小生成距离（格）
  # 避免漂浮物生成在玩家脸上
  spawn_distance_min: 16

  # 漂浮物距玩家的最大生成距离（格）
  # 超出此距离不会生成
  spawn_distance_max: 48

  # 在海平面以上（北/负Z方向）的额外最小生成偏移（格）
  # 用于控制生成区域的海岸方向范围
  spawn_north_min: 48

  # 在海平面以上（北/负Z方向）的额外最大生成偏移（格）
  spawn_north_max: 96

  # 生成点在 X 轴方向的随机偏移范围（格）
  # 实际生成位置会在基础位置 ± 此值范围内随机
  spawn_x_range: 28

  # 漂浮物自动消失距离（格）
  # 超出此距离的漂浮物会被自动清理
  despawn_distance: 128

  # 漂流移动速度（格/秒）
  drift_speed: 1.25

  # 生成时的 Y 轴偏移量（相对于海平面）
  # 默认海平面 Y=63，此值让漂浮物略微浮出水面
  y_level_offset: 0.2

# --------------------------------------------------------------
# 钩取 (Hook) 相关设置
# --------------------------------------------------------------
hook:
  # 两次钩取之间的冷却时间（秒）
  cooldown_seconds: 1.0

  # 钩取判定半径（格）
  # 鱼钩落点与漂浮物的距离在此范围内即判定命中
  hit_radius: 2.0

  # 拉回动画速度（格/tick）
  # 飘浮物被钩住后拉向玩家的速度
  grab_animation_speed: 1.0

# --------------------------------------------------------------
# 掉落提示设置
# --------------------------------------------------------------
# 控制掉落物品的提示位置：
#   action_bar - 仅物品栏上方小字提示（推荐，不刷屏）
#   chat       - 仅在聊天栏显示
#   both       - 同时显示在 action_bar 和聊天栏
#   none       - 不显示任何提示
# 注：概率 < 10% 的史诗掉落始终会在公屏广播（不受此选项影响）
show_loot_message: action_bar

# --------------------------------------------------------------
# 攻击（鱼钩伤害）设置
# --------------------------------------------------------------
attack:
  # 是否启用鱼钩攻击实体功能
  enabled: true
  # 鱼钩攻击冷却（秒）
  cooldown_seconds: 0.5

# --------------------------------------------------------------
# 第三方插件集成设置
# --------------------------------------------------------------
integrations:
  # ItemsAdder 自定义模型集成
  # 若为 true，漂浮物类型可使用 itemsadder_id 字段加载自定义模型
  itemsadder: true
  # WorldGuard 区域保护集成
  # 若为 true，生成漂浮物时会检查 WorldGuard 区域权限
  worldguard: true
  # BentoBox 岛屿插件集成
  # 若为 true，生成漂浮物时会检查 BentoBox 岛屿边界
  bentobox: true

# --------------------------------------------------------------
# 自定义漂流 AI 类路径
# --------------------------------------------------------------
# 留空使用默认漂流 AI (DefaultDriftAI)
# 可填入自定义实现类的完整限定名以覆盖默认行为
drift_ai_class: ""

# --------------------------------------------------------------
# 漂浮物类型配置
# --------------------------------------------------------------
# 漂浮物类型配置已迁移至 types.yml 文件
# 可通过游戏内指令 /hooked type ... 动态管理类型和掉落物
