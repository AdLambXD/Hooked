name: Hooked
version: 1.0
main: com.hooked.HookedPlugin
api-version: "1.21"
folia-supported: true
description: 木筏求生漂浮物收集系统
author: AdLamb

softdepend:
  - ItemsAdder
  - WorldGuard
  - BentoBox

commands:
  hooked:
    description: Hooked 插件主命令
    usage: /hooked <reload|debug|stats|test>
    aliases: [hk]

permissions:
  hooked.admin:
    description: 管理员权限
    default: op
  hooked.debug:
    description: 调试模式权限
    default: op
